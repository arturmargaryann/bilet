<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#161b27;--surface2:#1e2535;--surface3:#252d3d;
  --border:#2a3347;--border2:#354060;--accent:#4f8ef7;--accent2:#7c3aed;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --text:#e8eaf0;--text2:#8b93a8;--text3:#555f77;
  --radius:10px;--radius2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Armenian',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#1a2540 0%,var(--bg) 60%);}
.login-box{width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:2.5rem;}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo .icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;}
.login-logo h1{font-size:18px;font-weight:600;}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px;}
.role-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem;}
.role-tab{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text2);transition:all 0.2s;}
.role-tab.active{background:var(--surface3);color:var(--text);font-weight:500;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border 0.2s;}
.form-group input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),#3b70d4);border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
.login-btn:hover{opacity:0.9;}
.error-msg{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
#app-screen{display:flex;min-height:100vh;}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sidebar-header .brand{font-size:15px;font-weight:700;}
.sidebar-header .user-info{font-size:12px;color:var(--text2);margin-top:4px;}
.sidebar-header .user-role{display:inline-block;margin-top:6px;font-size:10px;padding:2px 8px;background:var(--surface3);border-radius:20px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.sidebar-nav{flex:1;padding:12px 10px;}
.nav-section{font-size:10px;color:var(--text3);padding:8px 8px 4px;text-transform:uppercase;letter-spacing:0.08em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;margin-bottom:2px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(124,58,237,0.1));color:var(--accent);}
.nav-item .ni{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.main{flex:1;overflow-y:auto;}
.page{padding:28px 32px;display:none;}
.page.active{display:block;}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 20px;}
.stat-card .sc-label{font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;}
.stat-card .sc-val{font-size:28px;font-weight:700;}
.stat-card .sc-sub{font-size:11px;color:var(--text2);margin-top:4px;}
.stat-card.accent{border-color:rgba(79,142,247,0.3);}
.stat-card.red{border-color:rgba(239,68,68,0.3);}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;margin-bottom:20px;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-header h3{font-size:14px;font-weight:600;}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;font-weight:500;}
.btn-primary{background:var(--accent);border:none;color:#fff;}
.btn-primary:hover{background:#3b70d4;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-danger:hover{background:rgba(239,68,68,0.1);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);font-weight:500;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-10,.badge-9{background:rgba(34,197,94,0.15);color:#4ade80;}
.badge-8,.badge-7{background:rgba(79,142,247,0.15);color:#7ab3f8;}
.badge-6,.badge-5{background:rgba(245,158,11,0.15);color:#fbbf24;}
.badge-4,.badge-3,.badge-2,.badge-1{background:rgba(239,68,68,0.15);color:#f87171;}
.badge-present{background:rgba(34,197,94,0.15);color:#4ade80;}
.badge-absent{background:rgba(239,68,68,0.15);color:#f87171;}
.badge-late{background:rgba(245,158,11,0.15);color:#fbbf24;}
.badge-admin{background:rgba(124,58,237,0.2);color:#a78bfa;}
.grade-input{width:42px;padding:5px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;}
.grade-input:focus{outline:none;border-color:var(--accent);}
.att-btn{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;border:none;transition:all 0.15s;margin-right:6px;}
.date-chip{padding:6px 14px;border-radius:8px;font-size:12px;background:var(--surface);border:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all 0.15s;}
.date-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.select-row{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.select-row label{font-size:13px;color:var(--text2);}
select{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
select:focus{border-color:var(--accent);}
.notif{display:flex;gap:14px;align-items:flex-start;padding:14px 18px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);margin-bottom:10px;}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.notif-text{font-size:13px;line-height:1.6;}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px;}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.av-blue{background:rgba(79,142,247,0.2);color:var(--accent);}
.av-purple{background:rgba(124,58,237,0.2);color:#a78bfa;}
.av-green{background:rgba(34,197,94,0.2);color:#4ade80;}
.av-red{background:rgba(239,68,68,0.2);color:#f87171;}
.td-flex{display:flex;align-items:center;gap:10px;}
.save-flash{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.save-flash.show{opacity:1;}
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.8);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.loading-overlay p{color:var(--text2);font-size:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:20px;}
.form-card h3{font-size:14px;font-weight:600;margin-bottom:18px;color:var(--text);}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px;}
.form-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
.form-field input,.form-field select{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.form-field input:focus,.form-field select:focus{border-color:var(--accent);}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;margin:3px;}
.tag-remove{cursor:pointer;color:var(--text3);font-size:14px;line-height:1;}
.tag-remove:hover{color:var(--red);}
.diary-day-header{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏫</div>
      <h1>SchoolDesk</h1>
      <p>School Management System</p>
    </div>
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('teacher')">Teacher</div>
      <div class="role-tab" onclick="setRole('student')">Student</div>
      <div class="role-tab" onclick="setRole('parent')">Parent</div>
      <div class="role-tab" onclick="setRole('admin')">Admin</div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username...">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">🏫 SchoolDesk</div>
      <div class="user-info" id="sidebar-user"></div>
      <div class="user-role" id="sidebar-role"></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">← Sign Out</button>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="loading-overlay hidden" id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">Loading...</p>
</div>
<div class="save-flash" id="save-flash">✓ Saved</div>

<script>
// ===================== CONFIG =====================
const API_KEY = '$2a$10$Gi.k.77zA4oqHpM7hiWOPu.sz164TIhfB/m5M0o91k2DOfHCi08b6';
const BIN_SCHOOL  = '69be81f0b7ec241ddc8bb006'; // users, classes, schedule
const BIN_GRADES  = '69be81fdaa77b81da90584f9'; // grades + lessonInfo
const BIN_ATT     = '69be81feaa77b81da90584fe'; // attendance

// ===================== STATIC ADMIN =====================
const ADMIN = { pass: 'SchoolAdmin2026', name: 'Administrator' };

// ===================== STATE =====================
let DB = { users:{}, classes:{}, schedule:{} };
let GRADES = {};
let LESSON_INFO = {};
let ATTENDANCE = {};
let currentUser = null;
let selectedClass = null;
let selectedDate = getTodayStr();
let selectedSubject = null;

// ===================== JSONBIN API =====================
async function binGet(id) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
    headers:{'X-Master-Key':API_KEY}
  });
  const d = await r.json();
  return d.record;
}

async function binSet(id, data) {
  await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify(data)
  });
}

// ===================== LOAD / SAVE =====================
async function loadAll() {
  showLoading('Loading school data...');
  try {
    const school = await binGet(BIN_SCHOOL);
    if (school && school.users) DB = school;
  } catch(e){}
  try {
    const g = await binGet(BIN_GRADES);
    if (g && g.grades) { GRADES = g.grades; LESSON_INFO = g.lessonInfo||{}; }
    else if (g && typeof g==='object') GRADES = g;
  } catch(e){}
  try {
    const a = await binGet(BIN_ATT);
    if (a && typeof a==='object' && !Array.isArray(a) && !a.type) ATTENDANCE = a;
  } catch(e){}
  // Init empty grade/att objects for classes
  Object.keys(DB.classes||{}).forEach(cls => {
    if (!GRADES[cls]) GRADES[cls] = {};
    if (!ATTENDANCE[cls]) ATTENDANCE[cls] = {};
    (DB.classes[cls]||[]).forEach(st => { if (!GRADES[cls][st]) GRADES[cls][st] = {}; });
  });
  hideLoading();
}

async function saveSchool() {
  try { await binSet(BIN_SCHOOL, DB); } catch(e){}
}

async function saveGradesDB() {
  try { await binSet(BIN_GRADES, {grades:GRADES, lessonInfo:LESSON_INFO}); } catch(e){}
}

async function saveAttDB() {
  try { await binSet(BIN_ATT, ATTENDANCE); } catch(e){}
}

// ===================== UTILS =====================
function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(str) {
  const d = new Date(str);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}
function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').substring(0,2);
}
function showLoading(txt='Loading...') {
  document.getElementById('loading-text').textContent=txt;
  document.getElementById('loading-overlay').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}
function flashSave() {
  const f=document.getElementById('save-flash');
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),2000);
}
function getSubjects(user) {
  const u = user||currentUser;
  return (u.subject||'').split('&').map(s=>s.trim()).filter(Boolean);
}

// ===================== AUTH =====================
let currentRole = 'teacher';
function setRole(r) {
  currentRole=r;
  document.querySelectorAll('.role-tab').forEach((t,i)=>{
    t.classList.toggle('active',['teacher','student','parent','admin'][i]===r);
  });
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('login-error');

  if (currentRole==='admin') {
    if (p===ADMIN.pass) {
      currentUser = {role:'admin',name:ADMIN.name,username:'admin'};
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      buildApp();
    } else { err.textContent='Incorrect password'; }
    return;
  }

  // Find user by username + role
  const users = DB.users||{};
  let found = null, foundKey = null;
  for (const [key, val] of Object.entries(users)) {
    const loginKey = key.replace(/_t$/,'').replace(/_s$/,'');
    if (loginKey===u && val.role===currentRole && val.pass===p) {
      found=val; foundKey=key; break;
    }
  }
  if (!found) { err.textContent='Incorrect username, password, or role'; return; }
  currentUser = {...found, username:foundKey};
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  buildApp();
}

function logout() {
  currentUser=null;
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('username').value='';
  document.getElementById('password').value='';
  document.getElementById('login-error').textContent='';
}

// ===================== APP =====================
function buildApp() {
  document.getElementById('sidebar-user').textContent=currentUser.name;
  const roleLabel = {teacher:'TEACHER',student:'STUDENT',parent:'PARENT',admin:'ADMIN'};
  document.getElementById('sidebar-role').textContent=roleLabel[currentUser.role]||'';

  const nav=document.getElementById('sidebar-nav');
  const main=document.getElementById('main-content');

  if (currentUser.role==='admin') {
    nav.innerHTML=`
      <div class="nav-section">Overview</div>
      <div class="nav-item active" onclick="showPage('admin-dashboard')" data-page="admin-dashboard"><span class="ni">📊</span> Dashboard</div>
      <div class="nav-section">Manage</div>
      <div class="nav-item" onclick="showPage('admin-teachers')" data-page="admin-teachers"><span class="ni">👨‍🏫</span> Teachers</div>
      <div class="nav-item" onclick="showPage('admin-students')" data-page="admin-students"><span class="ni">👥</span> Students</div>
      <div class="nav-item" onclick="showPage('admin-classes')" data-page="admin-classes"><span class="ni">🏫</span> Classes</div>
      <div class="nav-item" onclick="showPage('admin-schedule')" data-page="admin-schedule"><span class="ni">📅</span> Schedule</div>
    `;
    main.innerHTML = buildAdminDashboard()+buildAdminTeachers()+buildAdminStudents()+buildAdminClasses()+buildAdminSchedule();
    showPage('admin-dashboard');
  } else if (currentUser.role==='teacher') {
    selectedClass = (currentUser.classes||[])[0]||null;
    selectedSubject = getSubjects()[0]||null;
    nav.innerHTML=`
      <div class="nav-section">Overview</div>
      <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard"><span class="ni">📊</span> Dashboard</div>
      <div class="nav-section">Teaching</div>
      <div class="nav-item" onclick="showPage('grades')" data-page="grades"><span class="ni">📝</span> Grades</div>
      <div class="nav-item" onclick="showPage('attendance')" data-page="attendance"><span class="ni">📋</span> Attendance</div>
      <div class="nav-section">Other</div>
      <div class="nav-item" onclick="showPage('students')" data-page="students"><span class="ni">👥</span> Students</div>
      <div class="nav-item" onclick="showPage('notify')" data-page="notify"><span class="ni">🔔</span> Notifications</div>
    `;
    main.innerHTML=buildDashboard()+buildGradesPage()+buildAttendancePage()+buildStudentsPage()+buildNotifyPage();
    refreshGradesTable();
    refreshAttTable();
    showPage('dashboard');
  } else {
    nav.innerHTML=`
      <div class="nav-section">Diary</div>
      <div class="nav-item active" onclick="showPage('diary')" data-page="diary"><span class="ni">📖</span> My Diary</div>
      <div class="nav-item" onclick="showPage('my-grades')" data-page="my-grades"><span class="ni">⭐</span> My Grades</div>
    `;
    main.innerHTML=buildDiaryPage()+buildMyGradesPage();
    renderDiary();
    renderMyGrades();
    showPage('diary');
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  // Rebuild dynamic pages
  const rebuilds = {
    'dashboard': ()=>{ const o=document.getElementById('page-dashboard'); if(o) o.outerHTML=buildDashboard(); },
    'students':  ()=>{ const o=document.getElementById('page-students');  if(o) o.outerHTML=buildStudentsPage(); },
    'notify':    ()=>{ const o=document.getElementById('page-notify');    if(o) o.outerHTML=buildNotifyPage(); },
    'admin-dashboard': ()=>{ const o=document.getElementById('page-admin-dashboard'); if(o) o.outerHTML=buildAdminDashboard(); },
    'admin-teachers':  ()=>{ const o=document.getElementById('page-admin-teachers');  if(o) o.outerHTML=buildAdminTeachers(); },
    'admin-students':  ()=>{ const o=document.getElementById('page-admin-students');  if(o) o.outerHTML=buildAdminStudents(); },
    'admin-classes':   ()=>{ const o=document.getElementById('page-admin-classes');   if(o) o.outerHTML=buildAdminClasses(); },
    'admin-schedule':  ()=>{ const o=document.getElementById('page-admin-schedule');  if(o) o.outerHTML=buildAdminSchedule(); },
  };
  if (rebuilds[id]) rebuilds[id]();
  const pg=document.getElementById('page-'+id);
  if (pg) pg.classList.add('active');

function refreshGradesTable() {
  const cls=selectedClass;
  const date=selectedDate||getTodayStr();
  if(!selectedSubject) selectedSubject=getSubjects()[0]||'';
  const subj=selectedSubject;
  const students=DB.classes[cls]||[];
  const el=document.getElementById('grades-table-title');
  if(el) el.textContent=`${cls} · ${subj} · ${formatDate(date)}`;
  const li=LESSON_INFO[cls]&&LESSON_INFO[cls][subj]&&LESSON_INFO[cls][subj][date]?LESSON_INFO[cls][subj][date]:{};
  const tEl=document.getElementById('lesson-topic');
  const hEl=document.getElementById('lesson-homework');
  if(tEl) tEl.value=li.topic||'';
  if(hEl) hEl.value=li.homework||'';
  const tbl=document.getElementById('grades-table');
  if(!tbl) return;
  tbl.innerHTML=`<thead><tr><th>Student</th><th>Grade (1-10)</th></tr></thead><tbody>
    ${students.map((st,i)=>{
      const g=GRADES[cls]&&GRADES[cls][st]&&GRADES[cls][st][subj]&&GRADES[cls][st][subj][date]?GRADES[cls][st][subj][date]:'';
      return `<tr><td><div class="td-flex"><div class="avatar av-blue">${initials(st)}</div>${st}</div></td>
        <td><input class="grade-input" type="number" min="1" max="10" value="${g}" id="gi-${i}" placeholder="—"></td></tr>`;
    }).join('')}
  </tbody>`;
}

async function doSaveGrades() {
  const cls=selectedClass;
  const date=selectedDate||getTodayStr();
  const subj=selectedSubject||getSubjects()[0]||'';
  if(!GRADES[cls]) GRADES[cls]={};
  (DB.classes[cls]||[]).forEach((st,i)=>{
    const v=document.getElementById('gi-'+i)?.value;
    if(v&&v>=1&&v<=10){
      if(!GRADES[cls][st]) GRADES[cls][st]={};
      if(!GRADES[cls][st][subj]) GRADES[cls][st][subj]={};
      GRADES[cls][st][subj][date]=parseInt(v);
    }
  });
  const topic=document.getElementById('lesson-topic')?.value||'';
  const hw=document.getElementById('lesson-homework')?.value||'';
  if(!LESSON_INFO[cls]) LESSON_INFO[cls]={};
  if(!LESSON_INFO[cls][subj]) LESSON_INFO[cls][subj]={};
  LESSON_INFO[cls][subj][date]={topic,homework:hw};
  await saveGradesDB();
  flashSave();
}

function buildDiaryPage() {
  const now=new Date();
  const opts=[];
  for(let i=0;i<12;i++){
    const y=now.getFullYear(), m=i;
    const val=`${y}-${String(i+1).padStart(2,'0')}`;
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    opts.push(`<option value="${val}" ${i===now.getMonth()?'selected':''}>${months[i]} ${y}</option>`);
  }
  return `<div class="page" id="page-diary">

    <div class="page-sub" id="diary-sub"></div>
    <div class="select-row" style="margin-bottom:24px;">
      <label>Month:</label>
      <select id="diary-month-select" onchange="renderDiaryMonth()">${opts.join('')}</select>
    </div>
    <div id="diary-content"></div>
  </div>`;
}

function renderDiary() {
  const studentName=currentUser.role==='parent'?currentUser.studentName:currentUser.name;
  const cls=currentUser.role==='parent'?currentUser.studentClass:currentUser.class;
  document.getElementById('diary-sub').textContent=`${studentName} · Class ${cls}`;
  window._diaryStudent=studentName;
  window._diaryCls=cls;
  renderDiaryMonth();
}

function renderDiaryMonth() {
  const cls=window._diaryCls;
  const studentName=window._diaryStudent;
  const val=document.getElementById('diary-month-select').value;
  const [year,month]=val.split('-').map(Number);
  const allDays=[];
  const d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){
    if(d.getDay()>=1&&d.getDay()<=5) allDays.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  const weeks=[];
  let week=[];
  allDays.forEach(day=>{
    if(day.getDay()===1&&week.length>0){weeks.push(week);week=[];}
    week.push(day);
  });
  if(week.length>0) weeks.push(week);

  const dayKeyMap={1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri'};
  const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('diary-content').innerHTML=weeks.map((wk,wi)=>{
    const wStart=wk[0],wEnd=wk[wk.length-1];
    const weekLabel=`${wStart.getDate()}.${String(wStart.getMonth()+1).padStart(2,'0')}.${wStart.getFullYear()} – ${wEnd.getDate()}.${String(wEnd.getMonth()+1).padStart(2,'0')}.${wEnd.getFullYear()}`;
    const daysHtml=wk.map(day=>{
      const dateStr=dateToStr(day);
      const dk=dayKeyMap[day.getDay()];
      const schedule=(DB.schedule[cls]&&DB.schedule[cls][dk])||[];
      const att=ATTENDANCE[cls]&&ATTENDANCE[cls][dateStr]?ATTENDANCE[cls][dateStr][studentName]:null;
      return `<div style="margin-bottom:14px;">
        <div class="diary-day-header">
          <span>${dayNames[day.getDay()-1]}, ${day.getDate()} ${months[day.getMonth()]}</span>
          ${att?`<span class="badge badge-${att}">${att==='present'?'Present':att==='absent'?'Absent':'Late'}</span>`:''}
        </div>
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr>
            <th style="padding:4px 10px;font-size:10px;color:var(--text3);font-weight:500;width:28px;">#</th>
            <th style="padding:4px 10px;font-size:10px;color:var(--text3);font-weight:500;">Subject</th>
            <th style="padding:4px 10px;text-align:center;font-size:10px;color:var(--text3);font-weight:500;">Grade</th>
          </tr></thead>
          <tbody>
            ${schedule.length?schedule.map((lesson,i)=>{
              const g=GRADES[cls]&&GRADES[cls][studentName]&&GRADES[cls][studentName][lesson.sub]?GRADES[cls][studentName][lesson.sub][dateStr]:'';
              const info=LESSON_INFO[cls]&&LESSON_INFO[cls][lesson.sub]&&LESSON_INFO[cls][lesson.sub][dateStr]?LESSON_INFO[cls][lesson.sub][dateStr]:{};
              return `<tr style="${i%2===0?'background:var(--surface2)':''}">
                <td style="padding:5px 10px;font-size:11px;color:var(--text3);">${i+1}</td>
                <td style="padding:5px 10px;">
                  <div style="font-size:13px;font-weight:500;">${lesson.sub}</div>
                  ${info.topic?`<div style="font-size:11px;color:var(--text2);margin-top:1px;">📖 ${info.topic}</div>`:''}
                  ${info.homework?`<div style="font-size:11px;color:var(--amber);margin-top:1px;">✏️ ${info.homework}</div>`:''}
                </td>
                <td style="padding:5px 10px;text-align:center;">${g?`<span class="badge badge-${g}">${g}</span>`:'<span style="color:var(--text3);font-size:12px;">—</span>'}</td>
              </tr>`;
            }).join(''):`<tr><td colspan="3" style="padding:12px 10px;font-size:12px;color:var(--text3);text-align:center;">No lessons scheduled</td></tr>`}
          </tbody>
        </table>
      </div>`;
    }).join('');
    return `<div class="table-card" style="margin-bottom:20px;">
      <div class="table-header"><h3>Week ${wi+1} <span style="font-weight:400;color:var(--text2);font-size:13px;">${weekLabel}</span></h3></div>
      <div style="padding:16px 20px;">${daysHtml}</div>
    </div>`;
  }).join('');
}

function renderMyGrades() {

function toggleClassRename(cls) {
  const el=document.getElementById('cls-rename-'+cls);
  el.style.display=el.style.display==='none'?'block':'none';
}

async function renameClass(oldName) {
  const newName=document.getElementById('cls-newname-'+oldName).value.trim();
  if(!newName||newName===oldName) return;
  if(DB.classes[newName]){alert('Class already exists.');return;}
  DB.classes[newName]=DB.classes[oldName];
  delete DB.classes[oldName];
  // Update teachers classes
  Object.values(DB.users||{}).forEach(u=>{
    if(u.role==='teacher'&&u.classes){
      u.classes=u.classes.map(c=>c===oldName?newName:c);
    }
    if(u.role==='student'&&u.class===oldName) u.class=newName;
  });
  showLoading('Saving...');
  await saveSchool();
  hideLoading();
  flashSave();
  showPage('admin-classes');
}

async function editStudentName(cls,idx,oldName) {
  const newName=prompt('Edit student name:',oldName);
  if(!newName||newName===oldName) return;
  DB.classes[cls][idx]=newName;
  // Update grades/attendance keys
  if(GRADES[cls]&&GRADES[cls][oldName]){GRADES[cls][newName]=GRADES[cls][oldName];delete GRADES[cls][oldName];}
  Object.values(ATTENDANCE[cls]||{}).forEach(day=>{if(day[oldName]!==undefined){day[newName]=day[oldName];delete day[oldName];}});
  showLoading('Saving...');
  await Promise.all([saveSchool(),saveGradesDB(),saveAttDB()]);
  hideLoading();
  flashSave();
  showPage('admin-classes');
}

let _dragSrc=null;
function dragStart(e) {
  _dragSrc=e.currentTarget;
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
}
async function dropStudent(e) {
  e.preventDefault();
  const target=e.currentTarget;
  if(_dragSrc===target) return;
  const cls=target.getAttribute('data-cls');
  const list=document.getElementById('sortable-'+cls);
  const items=[...list.children];
  const fromIdx=items.indexOf(_dragSrc);
  const toIdx=items.indexOf(target);
  if(fromIdx<0||toIdx<0) return;
  // Reorder in DOM
  if(fromIdx<toIdx) list.insertBefore(_dragSrc,target.nextSibling);
  else list.insertBefore(_dragSrc,target);
  // Reorder in DB
  const arr=DB.classes[cls];
  const [moved]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,moved);
  await saveSchool();
  flashSave();
}

  const name=document.getElementById('cls-name').value.trim();

async function addLesson(cls,day) {
